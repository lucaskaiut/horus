openapi: 3.0.3
info:
  title: Elog API
  version: "0.1.0"
servers:
  - url: http://localhost:8000
paths:
  /api/login:
    post:
      summary: Login via servidor de autenticação
      description: >
        Recebe credenciais e repassa para o servidor de autenticação configurado em AUTH_SERVER_URL (base URL).
        Retorna somente token, name e email.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - login
                - password
              properties:
                login:
                  type: string
                  example: johndoe@example.com
                password:
                  type: string
                  example: "********"
                google2faValidation:
                  type: string
                  nullable: true
                  example: "******"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      token:
                        type: string
                        example: 1|8fG09Kcxc1gnGqGG064tWT8XtSJLDJi1GHYpjKFG
                      name:
                        type: string
                        example: John Doen
                      email:
                        type: string
                        example: johndoe@example.com
        "422":
          description: Erro de validação
  /api/me:
    post:
      summary: Valida sessão/token via servidor de autenticação
      description: >
        Encaminha o Bearer token para o servidor de autenticação em AUTH_SERVER_URL e valida o retorno.
        HTTP OK → usuário logado; HTTP Fail → usuário não autenticado.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Usuário logado.
        "401":
          description: Não autenticado
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Usuário não autenticado.
  /api/logs:
    post:
      summary: Recebe um log para processamento assíncrono
      description: >
        Valida o Bearer token no servidor externo usando `/auth/me`,
        valida o payload, gera `tracking_id` e publica o log na fila de processamento.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - level
                - message
                - source
                - environment
              properties:
                level:
                  type: string
                  enum: [debug, info, notice, warning, error, critical, alert, emergency]
                  example: error
                message:
                  type: string
                  example: Unexpected exception while processing order
                context:
                  type: object
                  additionalProperties: true
                entity_name:
                  type: string
                  nullable: true
                  example: order
                entity_id:
                  type: string
                  nullable: true
                  example: "123"
                source:
                  type: string
                  example: billing-api
                environment:
                  type: string
                  example: production
                channel:
                  type: string
                  nullable: true
                  example: http
                request_id:
                  type: string
                  nullable: true
                  example: req-123
                trace_id:
                  type: string
                  nullable: true
                  example: trace-123
                user_id:
                  type: string
                  nullable: true
                  example: user-123
                ip_address:
                  type: string
                  nullable: true
                  example: 10.0.0.10
                user_agent:
                  type: string
                  nullable: true
                  example: Mozilla/5.0
                exception:
                  type: object
                  nullable: true
                  properties:
                    class:
                      type: string
                      nullable: true
                      example: RuntimeException
                    message:
                      type: string
                      nullable: true
                      example: Failure
                    file:
                      type: string
                      nullable: true
                      example: /var/www/app/OrderService.php
                    line:
                      type: integer
                      nullable: true
                      example: 88
                    stack_trace:
                      type: string
                      nullable: true
                      example: stack trace content
      responses:
        "202":
          description: Accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Log recebido para processamento
                  tracking_id:
                    type: string
                    example: 01HXABC123
        "401":
          description: Não autenticado
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Token inválido ou não autorizado.
        "422":
          description: Erro de validação

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
